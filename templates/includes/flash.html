{% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
    <div class="container" style="padding-top: 20px;">
      {% for category, message in messages %}
        <div class="alert alert-{{ 'success' if category=='success' else 'danger' if category=='danger' else 'info' if category=='info' else 'warning' }}" role="alert">
          {{ message }}
        </div>
      {% endfor %}
    </div>
  {% endif %}
{% endwith %}
